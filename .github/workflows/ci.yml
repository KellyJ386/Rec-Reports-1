name: CI

on:
  pull_request:
  push:
    branches: ["claude/**", "main"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Placeholder values — the build performs no network calls; real secrets are
          # provided at deploy time (CLAUDE.md §8). facility_id is never an env var.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role
          NEXT_TELEMETRY_DISABLED: "1"
